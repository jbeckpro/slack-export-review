<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack Export</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Slack Export</h1>
            <p class="subtitle">Generated on 2025-09-15 03:36:52</p>
        </div>
    </header>

    <main class="container">
        <div class="search-container">
            <input type="text" id="channelSearch" placeholder="Search channels..." class="search-input">
        </div>

        <div class="channels-grid">
            
            <div class="channel-card" data-channel-name="general">
                <h2 class="channel-name">
                    
                        <a href="general.html">#general</a>
                    
                </h2>
                
                
                <p class="channel-topic">Company-wide announcements and general discussion</p>
                
                
                
                <p class="channel-purpose">This channel is for team-wide communication and announcements. Everyone is in this one.</p>
                
                
                <div class="channel-stats">
                    <span class="message-count">6 messages</span>
                    
                    <span class="date-range">2024-01-01 to 2024-01-01</span>
                    
                </div>
            </div>
            
        </div>

        
    </main>

    <script src="static/script.js"></script>
</body>
</html>
